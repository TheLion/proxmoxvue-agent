name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build linux/amd64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o proxmoxvue-agent ./cmd/proxmoxvue-agent
          tar -czf proxmoxvue-agent-linux-amd64.tar.gz proxmoxvue-agent
          sha256sum proxmoxvue-agent-linux-amd64.tar.gz > proxmoxvue-agent-linux-amd64.tar.gz.sha256
          rm proxmoxvue-agent

      - name: Build linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o proxmoxvue-agent ./cmd/proxmoxvue-agent
          tar -czf proxmoxvue-agent-linux-arm64.tar.gz proxmoxvue-agent
          sha256sum proxmoxvue-agent-linux-arm64.tar.gz > proxmoxvue-agent-linux-arm64.tar.gz.sha256
          rm proxmoxvue-agent

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
            --generate-notes \
            proxmoxvue-agent-linux-amd64.tar.gz \
            proxmoxvue-agent-linux-amd64.tar.gz.sha256 \
            proxmoxvue-agent-linux-arm64.tar.gz \
            proxmoxvue-agent-linux-arm64.tar.gz.sha256
